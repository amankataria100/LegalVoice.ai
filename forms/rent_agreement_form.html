<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rent Agreement</title>
<link rel="stylesheet" href="../styles.css">
</head>

<body>

<header>
<img src="../logo.png" style="width:100px;margin:auto;display:block;">
<h1>Rent Agreement</h1>
<p class="subheading">Fill rent agreement using voice</p>
</header>

<div id="nav-placeholder"></div>

<div class="container">
<div class="dual-panel">

<div class="voice-panel">
<div class="panel">
<h2>Voice Recognition</h2>
<button id="microphoneBtn">Start Voice Recognition</button>
<div id="statusMessage">Click to start</div>
<div id="recognizedText"><p id="transcriptText"></p></div>
</div>
</div>

<div class="form-panel">
<div class="panel">
<h2>Rent Agreement Form</h2>

<form id="legalForm">

<input type="text" id="tenantName" placeholder="Tenant Name">
<input type="text" id="ownerName" placeholder="Owner Name">
<input type="text" id="rentAmount" placeholder="Rent Amount">
<textarea id="propertyAddress" placeholder="Property Address"></textarea>

<div class="form-footer">
<button type="button" id="clearFormBtn">Clear</button>
<button type="button" id="downloadFormBtn">Download</button>
</div>

</form>
</div>
</div>

</div>
</div>

<footer><p>LegalVoice.AI</p></footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$("#nav-placeholder").load("../nav.html");
</script>

<script src="../form_scripts/rent_agreement_form.js"></script>

</body>
</html>
