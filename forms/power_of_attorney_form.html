<h1>Power of Attorney</h1>
<script src="../form_scripts/common_form.js"></script>
<form id="legalForm">
    <div class="form-group">
        <label>Grantor Name</label>
        <input type="text" id="grantorName" required>
    </div>

    <div class="form-group">
        <label>Agent Name</label>
        <input type="text" id="agentName" required>
    </div>

    <div class="form-group">
        <label>Powers Granted</label>
        <textarea id="powersGranted" required></textarea>
    </div>

    <div class="form-footer">
        <button type="button" id="clearFormBtn">Clear</button>
        <button type="button" id="downloadFormBtn">Download</button>
    </div>

</form>
